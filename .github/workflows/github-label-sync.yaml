name: github-label-sync

on:
  push:
    paths:
      - .github/labels.yaml
      - .github/workflows/github-label-sync.yaml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/github-label-sync-action
